<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Admin Panel - FWCB Lazy CWL</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f8f9fa; margin: 0; }
        .header-title { text-align: center; color: #1e3c72; margin-bottom: 20px; text-transform: uppercase; }
        .admin-container { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 20px; }
        .box { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); flex: 1; min-width: 320px; }
        
        h2 { color: #2c3e50; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input[type="text"], input[type="url"], input[type="number"], input[type="email"], input[type="password"], select, textarea { display: block; width: 100%; margin: 10px 0; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; }
        input:focus, select:focus, textarea:focus { border-color: #2a5298; outline: none; }
        
        button { width: 100%; padding: 12px; border: none; cursor: pointer; font-weight: bold; border-radius: 8px; text-transform: uppercase; transition: 0.3s; color: white; margin-top: 10px;}
        #submit-btn { background-color: #27ae60; } #submit-btn:hover { background-color: #2ecc71; }
        #logout-btn { background-color: #7f8c8d; } #login-btn { background-color: #e74c3c; }
        
        .checkbox-container { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; }
        .checkbox-container label { display: flex; align-items: center; gap: 5px; font-weight: 600; cursor: pointer; }
        
        .clan-list-item { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; background: #fdfdfd; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .clan-info h4 { margin: 0 0 5px 0; color: #1e3c72; font-size: 18px; }
        .clan-info p { margin: 0; font-size: 13px; color: #555; }
        .action-btns { display: flex; gap: 10px; }
        .edit-btn { background-color: #f39c12; padding: 8px 15px; width: auto; font-size: 12px; }
        .delete-btn { background-color: #e74c3c; padding: 8px 15px; width: auto; font-size: 12px; }
        #cancel-edit-btn { background-color: #95a5a6; display: none; }

        /* সিরিয়াল করার জন্য নতুন স্টাইল */
        .sortable-item { display: flex; justify-content: space-between; align-items: center; background: #fdfdfd; border: 1px solid #ccc; padding: 10px 15px; margin-bottom: 8px; border-radius: 6px; font-weight: bold; color: #333; }
        .sortable-item button { width: auto; margin: 0 2px; padding: 5px 10px; font-size: 16px; background: #ecf0f1; color: #333; border: 1px solid #ddd; margin-top: 0; }
        .sortable-item button:hover:not(:disabled) { background: #dcdde1; }
        .sortable-item button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1 class="header-title">Admin Dashboard</h1>

    <div id="login-section" style="max-width: 400px; margin: 0 auto;" class="box">
        <h2>লগিন করুন</h2>
        <input type="email" id="email" placeholder="Admin Email">
        <input type="password" id="password" placeholder="Password">
        <button id="login-btn">Login</button>
        <p id="login-error" style="color: red; text-align: center; margin-top: 10px;"></p>
    </div>

    <div id="admin-section" class="admin-container" style="display: none;">
        
        <div class="box" id="form-box">
            <h2 id="form-title">নতুন ক্ল্যান অ্যাড করুন</h2>
            <input type="hidden" id="edit-clan-id"> 
            
            <input type="text" id="clan-name" placeholder="Clan Name (e.g. CWL Masters)">
            <input type="text" id="clan-tag" placeholder="Clan Tag (e.g. #YQ8R92L)">
            <input type="url" id="clan-link" placeholder="Join Link (Discord/In-game)">
            
            <select id="cwl-league">
    <option value="" disabled selected>Select CWL League</option>
    <option value="Unranked">Unranked</option>
    <option value="Bronze 3">Bronze 3</option>
    <option value="Bronze 2">Bronze 2</option>
    <option value="Bronze 1">Bronze 1</option>
    <option value="Silver 3">Silver 3</option>
    <option value="Silver 2">Silver 2</option>
    <option value="Silver 1">Silver 1</option>
    <option value="Gold 3">Gold 3</option>
    <option value="Gold 2">Gold 2</option>
    <option value="Gold 1">Gold 1</option>
    <option value="Crystal 3">Crystal 3</option>
    <option value="Crystal 2">Crystal 2</option>
    <option value="Crystal 1">Crystal 1</option>
    <option value="Master 3">Master 3</option>
    <option value="Master 2">Master 2</option>
    <option value="Master 1">Master 1</option>
    <option value="Champion 3">Champion 3</option>
    <option value="Champion 2">Champion 2</option>
    <option value="Champion 1">Champion 1</option>
    <option value="Titan 3">Titan 3</option>
    <option value="Titan 2">Titan 2</option>
    <option value="Titan 1">Titan 1</option>
    <option value="Legend">Legend</option>
            </select>

            <input type="number" id="max-members" placeholder="Max Members (e.g. 40)">
            <textarea id="clan-desc" placeholder="Optional Description..." rows="2"></textarea>
            
            <p style="margin: 10px 0 5px 0; font-weight: bold; color: #1e3c72;">Required Town Halls:</p>
            <div class="checkbox-container">
                <label><input type="checkbox" value="11" class="th-checkbox"> TH 11</label>
                <label><input type="checkbox" value="12" class="th-checkbox"> TH 12</label>
                <label><input type="checkbox" value="13" class="th-checkbox"> TH 13</label>
                <label><input type="checkbox" value="14" class="th-checkbox"> TH 14</label>
                <label><input type="checkbox" value="15" class="th-checkbox"> TH 15</label>
                <label><input type="checkbox" value="16" class="th-checkbox"> TH 16</label>
                <label><input type="checkbox" value="17" class="th-checkbox"> TH 17</label>
                <label><input type="checkbox" value="18" class="th-checkbox"> TH 18</label>
            </div>

            <button id="submit-btn">Add Clan</button>
            <button id="cancel-edit-btn">Cancel Edit</button>
            <p id="success-msg" style="color: green; font-weight: bold; text-align: center; margin-top: 15px;"></p>
            
            <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
            <button id="logout-btn">Logout</button>
        </div>

        <div style="flex: 1; min-width: 320px; display: flex; flex-direction: column; gap: 20px;">
            
            <div class="box">
                <h2>Manage Clans (<span id="total-clans">0</span>)</h2>
                <div id="admin-clan-list">
                    <p style="text-align: center; color: #888;">Loading clans...</p>
                </div>
            </div>

            <div class="box">
                <h2>সেকশন সিরিয়াল করুন</h2>
                <p style="font-size: 13px; color: #777; margin-bottom: 15px;">উপর-নিচ করে টাউন হল সেকশনের সিরিয়াল সাজান এবং সেভ করুন।</p>
                
                <div id="sortable-sections">
                    <p style="text-align: center; color: #888;">Loading sections...</p>
                </div>
                
                <button id="save-order-btn" style="background-color: #3498db;">Save Serial Order</button>
                <p id="order-success-msg" style="color: green; font-weight: bold; text-align: center; margin-top: 10px;"></p>
            </div>

        </div>

    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
      import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyC4hVhFlEBrdW7hF2EdLLTp6RiEaN-xxIA",
        authDomain: "lazy-cwl-directory.firebaseapp.com",
        projectId: "lazy-cwl-directory",
        storageBucket: "lazy-cwl-directory.firebasestorage.app",
        messagingSenderId: "587882023145",
        appId: "1:587882023145:web:ee8ac1f673e7b0e3e98878"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);
      let currentOrder = [];

      onAuthStateChanged(auth, (user) => {
        if(user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('admin-section').style.display = 'flex';
            fetchAdminClans();
        } else {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('admin-section').style.display = 'none';
        }
      });

      document.getElementById('login-btn').addEventListener('click', () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
          .catch(() => document.getElementById('login-error').innerText = "ভুল ইমেইল বা পাসওয়ার্ড!");
      });
      document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

      async function fetchAdminClans() {
          const listContainer = document.getElementById('admin-clan-list');
          try {
              const querySnapshot = await getDocs(collection(db, "clans"));
              listContainer.innerHTML = '';
              document.getElementById('total-clans').innerText = querySnapshot.size;

              const groupsSet = new Set(); // ইউনিক সেকশন বের করার জন্য

              if(querySnapshot.empty) {
                  listContainer.innerHTML = '<p>No clans added yet.</p>';
                  loadSectionOrder([]);
                  return;
              }

              querySnapshot.forEach((docSnap) => {
                  const clan = docSnap.data();
                  const clanId = docSnap.id;
                  let thArr = Array.isArray(clan.th) ? clan.th : [clan.th];
                  thArr.sort((a, b) => a - b);
                  
                  const groupKey = thArr.join(', ');
                  groupsSet.add(groupKey);

                  const div = document.createElement('div');
                  div.className = 'clan-list-item';
                  div.innerHTML = `
                      <div class="clan-info">
                          <h4>${clan.name} <span style="font-size:12px; color:#e74c3c;">(${clan.tag})</span></h4>
                          <p><strong>TH:</strong> ${groupKey} | <strong>League:</strong> ${clan.league}</p>
                      </div>
                      <div class="action-btns">
                          <button class="edit-btn" data-id="${clanId}" data-clan='${JSON.stringify(clan)}'>Edit</button>
                          <button class="delete-btn" data-id="${clanId}">Delete</button>
                      </div>
                  `;
                  listContainer.appendChild(div);
              });

              attachActionListeners();
              loadSectionOrder(Array.from(groupsSet));
          } catch (e) { console.error(e); }
      }

      // --- Section Reordering Logic ---
      async function loadSectionOrder(availableGroups) {
          const orderDoc = await getDoc(doc(db, "settings", "layout"));
          let savedOrder = orderDoc.exists() ? orderDoc.data().order || [] : [];

          // পুরানো সেভ করা অর্ডার এবং নতুন গ্রুপের সমন্বয়
          currentOrder = [...savedOrder];
          availableGroups.forEach(g => {
              if(!currentOrder.includes(g)) currentOrder.push(g);
          });
          currentOrder = currentOrder.filter(g => availableGroups.includes(g));

          renderOrderList();
      }

      function renderOrderList() {
          const container = document.getElementById('sortable-sections');
          container.innerHTML = '';
          
          if(currentOrder.length === 0) {
              container.innerHTML = '<p style="text-align:center; color:#888;">No sections available.</p>';
              return;
          }

          currentOrder.forEach((group, index) => {
              const div = document.createElement('div');
              div.className = 'sortable-item';
              div.innerHTML = `<span>Town Hall ${group}</span>`;

              const btnDiv = document.createElement('div');
              
              const upBtn = document.createElement('button');
              upBtn.innerText = '⬆️';
              upBtn.disabled = index === 0;
              upBtn.onclick = () => moveOrder(index, -1);

              const downBtn = document.createElement('button');
              downBtn.innerText = '⬇️';
              downBtn.disabled = index === currentOrder.length - 1;
              downBtn.onclick = () => moveOrder(index, 1);

              btnDiv.appendChild(upBtn);
              btnDiv.appendChild(downBtn);
              div.appendChild(btnDiv);
              container.appendChild(div);
          });
      }

      function moveOrder(index, direction) {
          const temp = currentOrder[index];
          currentOrder[index] = currentOrder[index + direction];
          currentOrder[index + direction] = temp;
          renderOrderList();
      }

      document.getElementById('save-order-btn').addEventListener('click', async () => {
          try {
              document.getElementById('save-order-btn').innerText = "Saving...";
              await setDoc(doc(db, "settings", "layout"), { order: currentOrder });
              document.getElementById('save-order-btn').innerText = "Save Serial Order";
              document.getElementById('order-success-msg').innerText = "সিরিয়াল সফলভাবে সেভ হয়েছে!";
              setTimeout(() => document.getElementById('order-success-msg').innerText = '', 3000);
          } catch(e) { console.error(e); }
      });
      // ----------------------------------

      function attachActionListeners() {
          document.querySelectorAll('.edit-btn').forEach(btn => {
              btn.addEventListener('click', (e) => {
                  const id = e.target.getAttribute('data-id');
                  const clan = JSON.parse(e.target.getAttribute('data-clan'));
                  
                  document.getElementById('form-title').innerText = "ক্ল্যান আপডেট করুন";
                  document.getElementById('submit-btn').innerText = "Update Clan";
                  document.getElementById('cancel-edit-btn').style.display = "block";
                  document.getElementById('edit-clan-id').value = id;

                  document.getElementById('clan-name').value = clan.name;
                  document.getElementById('clan-tag').value = clan.tag;
                  document.getElementById('clan-link').value = clan.link;
                  document.getElementById('cwl-league').value = clan.league;
                  document.getElementById('max-members').value = clan.members !== "N/A" ? clan.members : '';
                  document.getElementById('clan-desc').value = clan.description;

                  const thArr = Array.isArray(clan.th) ? clan.th : [clan.th];
                  document.querySelectorAll('.th-checkbox').forEach(cb => {
                      cb.checked = thArr.includes(parseInt(cb.value));
                  });

                  window.scrollTo({ top: 0, behavior: 'smooth' });
              });
          });

          document.querySelectorAll('.delete-btn').forEach(btn => {
              btn.addEventListener('click', async (e) => {
                  const id = e.target.getAttribute('data-id');
                  if(confirm("আপনি কি নিশ্চিত যে এই ক্ল্যানটি ডিলিট করতে চান?")) {
                      await deleteDoc(doc(db, "clans", id));
                      fetchAdminClans(); 
                  }
              });
          });
      }

      document.getElementById('submit-btn').addEventListener('click', async () => {
        const checkboxes = document.querySelectorAll('.th-checkbox:checked');
        const thArray = Array.from(checkboxes).map(cb => parseInt(cb.value));
        const clanName = document.getElementById('clan-name').value;

        if(thArray.length === 0 || !clanName) {
            alert("অনুগ্রহ করে ক্ল্যানের নাম এবং অন্তত একটি টাউন হল সিলেক্ট করুন!");
            return;
        }

        const clanData = {
            name: clanName,
            tag: document.getElementById('clan-tag').value,
            link: document.getElementById('clan-link').value,
            league: document.getElementById('cwl-league').value,
            members: document.getElementById('max-members').value || "N/A",
            description: document.getElementById('clan-desc').value || "", 
            th: thArray
        };

        const editId = document.getElementById('edit-clan-id').value;

        try {
            document.getElementById('submit-btn').innerText = "Processing...";
            if(editId) {
                await updateDoc(doc(db, "clans", editId), clanData);
                document.getElementById('success-msg').innerText = "সফলভাবে আপডেট করা হয়েছে!";
            } else {
                await addDoc(collection(db, "clans"), clanData);
                document.getElementById('success-msg').innerText = "সফলভাবে ক্ল্যান অ্যাড করা হয়েছে!";
            }
            
            resetForm();
            fetchAdminClans(); 
        } catch (e) { console.error(e); }
      });

      function resetForm() {
          document.getElementById('edit-clan-id').value = '';
          document.getElementById('form-title').innerText = "নতুন ক্ল্যান অ্যাড করুন";
          document.getElementById('submit-btn').innerText = "Add Clan";
          document.getElementById('cancel-edit-btn').style.display = "none";
          
          document.getElementById('clan-name').value = '';
          document.getElementById('clan-tag').value = '';
          document.getElementById('clan-link').value = '';
          document.getElementById('cwl-league').value = '';
          document.getElementById('max-members').value = '';
          document.getElementById('clan-desc').value = '';
          document.querySelectorAll('.th-checkbox').forEach(cb => cb.checked = false);
          
          setTimeout(() => document.getElementById('success-msg').innerText = '', 3000);
      }
      document.getElementById('cancel-edit-btn').addEventListener('click', resetForm);

    </script>
</body>
</html>
