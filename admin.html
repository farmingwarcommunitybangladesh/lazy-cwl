<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWCB - Admin Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        /* =========================================
           1. Global Styles & Reset
        ========================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: #f4f7f6; color: #333; }
        
        /* =========================================
           2. Dashboard Navbar
        ========================================= */
        .admin-nav {
            background-color: #1e293b; /* Dark Slate / Admin Vibe */
            color: #fff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .admin-nav h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
        #logout-btn { background-color: #ef4444; padding: 8px 16px; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: 600; transition: 0.3s; }
        #logout-btn:hover { background-color: #dc2626; }

        /* =========================================
           3. Layout Containers
        ========================================= */
        .dashboard-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 25px; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; flex: 1; min-width: 320px; }
        
        .section-header { font-size: 18px; color: #0f172a; margin-bottom: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; font-weight: 600; }

        /* =========================================
           4. Form Elements
        ========================================= */
        .form-group { margin-bottom: 15px; }
        label.input-label { display: block; font-size: 13px; color: #64748b; font-weight: 500; margin-bottom: 5px; }
        input[type="text"], input[type="url"], input[type="number"], input[type="email"], input[type="password"], select, textarea { 
            width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; background-color: #f8fafc; transition: 0.3s; 
        }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; outline: none; background-color: #fff; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        /* =========================================
           5. Checkbox Grid (FIXED ALIGNMENT)
        ========================================= */
        .th-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 columns -> 2 rows for 8 items */
            gap: 10px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
        }
        .th-grid label { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; color: #334155; cursor: pointer; }
        .th-grid input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #3b82f6; }

        /* =========================================
           6. Buttons
        ========================================= */
        .btn-primary { width: 100%; padding: 14px; border: none; cursor: pointer; font-weight: 600; border-radius: 8px; text-transform: uppercase; transition: 0.3s; color: white; margin-top: 10px; letter-spacing: 0.5px; }
        #submit-btn { background-color: #10b981; } #submit-btn:hover { background-color: #059669; }
        #cancel-edit-btn { background-color: #94a3b8; display: none; } #cancel-edit-btn:hover { background-color: #64748b; }
        #login-btn { background-color: #3b82f6; } #login-btn:hover { background-color: #2563eb; }
        
        /* =========================================
           7. List Items & Actions
        ========================================= */
        .list-item { border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 12px; background: #fff; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .list-item:hover { border-color: #cbd5e1; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .item-info h4 { margin: 0 0 5px 0; color: #1e293b; font-size: 16px; }
        .item-info p { margin: 0; font-size: 13px; color: #64748b; }
        .action-btns { display: flex; gap: 8px; }
        .btn-edit { background-color: #f59e0b; color: white; padding: 6px 12px; border: none; border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .btn-delete { background-color: #ef4444; color: white; padding: 6px 12px; border: none; border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .btn-edit:hover { background-color: #d97706; } .btn-delete:hover { background-color: #dc2626; }

        /* Sortable Sections */
        .sort-item { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px 15px; margin-bottom: 8px; border-radius: 6px; font-weight: 600; color: #334155; font-size: 14px; }
        .sort-actions button { background: #e2e8f0; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 14px; margin-left: 5px; }
        .sort-actions button:hover:not(:disabled) { background: #cbd5e1; }
        .sort-actions button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Responsive Fix for Mobile Checkboxes */
        @media(max-width: 600px) {
            .th-grid { grid-template-columns: repeat(2, 1fr); } /* On mobile, 2 columns */
            .dashboard-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div id="login-section" style="max-width: 400px; margin: 100px auto;" class="card">
        <h2 class="section-header" style="text-align: center; border: none;">Admin Authorization</h2>
        <div class="form-group">
            <label class="input-label">Email Address</label>
            <input type="email" id="email" placeholder="admin@example.com">
        </div>
        <div class="form-group">
            <label class="input-label">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button id="login-btn" class="btn-primary">Secure Login</button>
        <p id="login-error" style="color: #ef4444; text-align: center; margin-top: 15px; font-size: 14px; font-weight: 500;"></p>
    </div>

    <div id="admin-section" style="display: none;">
        
        <nav class="admin-nav">
            <h1>FWCB Dashboard</h1>
            <button id="logout-btn">Log Out</button>
        </nav>

        <div class="dashboard-container">
            
            <div class="card" id="form-box">
                <h2 class="section-header" id="form-title">Add New Clan</h2>
                <input type="hidden" id="edit-clan-id"> 
                
                <div class="form-group">
                    <label class="input-label">Clan Name</label>
                    <input type="text" id="clan-name" placeholder="e.g. FWCB Elite">
                </div>
                
                <div class="form-group">
                    <label class="input-label">Clan Tag</label>
                    <input type="text" id="clan-tag" placeholder="e.g. #YQ8R92L">
                </div>
                
                <div class="form-group">
                    <label class="input-label">Join Link</label>
                    <input type="url" id="clan-link" placeholder="Discord or In-game Invite Link">
                </div>
                
                <div class="form-group">
                    <label class="input-label">CWL League</label>
                    <select id="cwl-league">
                        <option value="" disabled selected>Select League...</option>
                        <option value="Unranked">Unranked</option>
                        <option value="Bronze 3">Bronze 3</option><option value="Bronze 2">Bronze 2</option><option value="Bronze 1">Bronze 1</option>
                        <option value="Silver 3">Silver 3</option><option value="Silver 2">Silver 2</option><option value="Silver 1">Silver 1</option>
                        <option value="Gold 3">Gold 3</option><option value="Gold 2">Gold 2</option><option value="Gold 1">Gold 1</option>
                        <option value="Crystal 3">Crystal 3</option><option value="Crystal 2">Crystal 2</option><option value="Crystal 1">Crystal 1</option>
                        <option value="Master 3">Master 3</option><option value="Master 2">Master 2</option><option value="Master 1">Master 1</option>
                        <option value="Champion 3">Champion 3</option><option value="Champion 2">Champion 2</option><option value="Champion 1">Champion 1</option>
                        <option value="Titan 3">Titan 3</option><option value="Titan 2">Titan 2</option><option value="Titan 1">Titan 1</option>
                        <option value="Legend">Legend</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="input-label">Max Members</label>
                    <input type="number" id="max-members" placeholder="e.g. 40">
                </div>

                <div class="form-group">
                    <label class="input-label">Special Note / Description (Optional)</label>
                    <textarea id="clan-desc" placeholder="e.g. Not more than 41 members can join..." rows="2"></textarea>
                </div>
                
                <div class="form-group">
                    <label class="input-label" style="color: #1e293b; font-weight: 600;">Required Town Halls</label>
                    <div class="th-grid">
                        <label><input type="checkbox" value="8" class="th-checkbox"> TH 08</label>
                        <label><input type="checkbox" value="9" class="th-checkbox"> TH 09</label>
                        <label><input type="checkbox" value="10" class="th-checkbox"> TH 10</label>
                        <label><input type="checkbox" value="11" class="th-checkbox"> TH 11</label>
                        <label><input type="checkbox" value="12" class="th-checkbox"> TH 12</label>
                        <label><input type="checkbox" value="13" class="th-checkbox"> TH 13</label>
                        <label><input type="checkbox" value="14" class="th-checkbox"> TH 14</label>
                        <label><input type="checkbox" value="15" class="th-checkbox"> TH 15</label>
                        <label><input type="checkbox" value="16" class="th-checkbox"> TH 16</label>
                        <label><input type="checkbox" value="17" class="th-checkbox"> TH 17</label>
                        <label><input type="checkbox" value="18" class="th-checkbox"> TH 18</label>
                    </div>
                </div>

                <button id="submit-btn" class="btn-primary">Save Clan Data</button>
                <button id="cancel-edit-btn" class="btn-primary">Cancel Editing</button>
                <p id="success-msg" style="color: #10b981; font-weight: 600; text-align: center; margin-top: 15px; font-size: 14px;"></p>
            </div>

            <div style="flex: 1; min-width: 320px; display: flex; flex-direction: column; gap: 25px;">
                
                <div class="card">
                    <h2 class="section-header">Manage Active Clans (<span id="total-clans">0</span>)</h2>
                    <div id="admin-clan-list">
                        <p style="text-align: center; color: #94a3b8; font-size: 14px;">Loading data...</p>
                    </div>
                </div>
                
                <div class="card">
                    <h2 class="section-header">Section Layout Order</h2>
                    <p style="font-size: 12px; color: #64748b; margin-bottom: 15px;">Use the arrows to define the display order of the Town Hall sections on the live website.</p>
                    <div id="sortable-sections"></div>
                    <button id="save-order-btn" class="btn-primary" style="background-color: #3b82f6;">Update Layout Order</button>
                    <p id="order-success-msg" style="color: #10b981; font-weight: 600; text-align: center; margin-top: 10px; font-size: 14px;"></p>
                </div>

            </div>
        </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
      import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyC4hVhFlEBrdW7hF2EdLLTp6RiEaN-xxIA",
        authDomain: "lazy-cwl-directory.firebaseapp.com",
        projectId: "lazy-cwl-directory",
        storageBucket: "lazy-cwl-directory.firebasestorage.app",
        messagingSenderId: "587882023145",
        appId: "1:587882023145:web:ee8ac1f673e7b0e3e98878"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);
      let allClansData = {}; 
      let currentOrder = [];

      // Authentication State
      onAuthStateChanged(auth, (user) => {
        document.getElementById('login-section').style.display = user ? 'none' : 'block';
        document.getElementById('admin-section').style.display = user ? 'block' : 'none';
        if(user) fetchAdminClans();
      });

      // Login/Logout Events
      document.getElementById('login-btn').addEventListener('click', () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
            .catch(() => document.getElementById('login-error').innerText = "Access Denied: Invalid Email or Password!");
      });
      document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

      // Fetch Clans
      async function fetchAdminClans() {
          const listContainer = document.getElementById('admin-clan-list');
          listContainer.innerHTML = '<p style="text-align: center; color: #94a3b8; font-size: 14px;">Fetching data...</p>';
          allClansData = {};
          const groupsSet = new Set();
          try {
              const querySnapshot = await getDocs(collection(db, "clans"));
              listContainer.innerHTML = '';
              document.getElementById('total-clans').innerText = querySnapshot.size;
              
              if(querySnapshot.empty) {
                  listContainer.innerHTML = '<p style="text-align: center; color: #94a3b8; font-size: 14px;">No clans found in database.</p>';
              }

              querySnapshot.forEach((docSnap) => {
                  const clan = docSnap.data();
                  const clanId = docSnap.id;
                  allClansData[clanId] = clan; 
                  
                  let thArr = Array.isArray(clan.th) ? clan.th : [clan.th];
                  thArr.sort((a, b) => a - b);
                  const groupKey = thArr.join(', ');
                  groupsSet.add(groupKey);

                  const div = document.createElement('div');
                  div.className = 'list-item';
                  div.innerHTML = `
                      <div class="item-info">
                          <h4>${clan.name}</h4>
                          <p>TH: ${groupKey} &nbsp;|&nbsp; League: ${clan.league}</p>
                      </div>
                      <div class="action-btns">
                          <button class="btn-edit" data-id="${clanId}">Edit</button>
                          <button class="btn-delete" data-id="${clanId}">Delete</button>
                      </div>
                  `;
                  listContainer.appendChild(div);
              });
              attachActionListeners();
              loadSectionOrder(Array.from(groupsSet));
          } catch (e) { console.error(e); }
      }

      // Button Actions (Edit / Delete)
      function attachActionListeners() {
          document.querySelectorAll('.btn-edit').forEach(btn => {
              btn.addEventListener('click', (e) => {
                  const id = e.target.getAttribute('data-id');
                  const clan = allClansData[id];
                  
                  document.getElementById('form-title').innerText = "Update Clan Information";
                  document.getElementById('submit-btn').innerText = "Update Data";
                  document.getElementById('cancel-edit-btn').style.display = "block";
                  document.getElementById('edit-clan-id').value = id;
                  
                  document.getElementById('clan-name').value = clan.name;
                  document.getElementById('clan-tag').value = clan.tag || '';
                  document.getElementById('clan-link').value = clan.link;
                  document.getElementById('cwl-league').value = clan.league;
                  document.getElementById('max-members').value = clan.members !== "N/A" ? clan.members : '';
                  document.getElementById('clan-desc').value = clan.description || '';
                  
                  const thArr = Array.isArray(clan.th) ? clan.th : [clan.th];
                  document.querySelectorAll('.th-checkbox').forEach(cb => { cb.checked = thArr.includes(parseInt(cb.value)); });
                  
                  window.scrollTo({ top: 0, behavior: 'smooth' });
              });
          });

          document.querySelectorAll('.btn-delete').forEach(btn => {
              btn.addEventListener('click', async (e) => {
                  if(confirm("Warning: Are you sure you want to permanently delete this clan?")) {
                      await deleteDoc(doc(db, "clans", e.target.getAttribute('data-id')));
                      fetchAdminClans();
                  }
              });
          });
      }

      // Add or Update Clan
      document.getElementById('submit-btn').addEventListener('click', async () => {
          const thArray = Array.from(document.querySelectorAll('.th-checkbox:checked')).map(cb => parseInt(cb.value));
          const clanName = document.getElementById('clan-name').value;
          const editId = document.getElementById('edit-clan-id').value;
          
          if(thArray.length === 0 || !clanName) { 
              alert("Validation Error: Please provide a Clan Name and select at least one Town Hall level!"); 
              return; 
          }

          const clanData = {
              name: clanName,
              tag: document.getElementById('clan-tag').value,
              link: document.getElementById('clan-link').value,
              league: document.getElementById('cwl-league').value,
              members: document.getElementById('max-members').value || "N/A",
              description: document.getElementById('clan-desc').value || "", 
              th: thArray
          };

          try {
              document.getElementById('submit-btn').innerText = "Processing Data...";
              if(editId) {
                  await updateDoc(doc(db, "clans", editId), clanData);
                  document.getElementById('success-msg').innerText = "Clan data updated successfully!";
              } else {
                  await addDoc(collection(db, "clans"), clanData);
                  document.getElementById('success-msg').innerText = "New clan added successfully!";
              }
              resetForm();
              fetchAdminClans();
          } catch (e) { console.error(e); }
      });

      // Reset Form
      function resetForm() {
          document.getElementById('edit-clan-id').value = '';
          document.getElementById('form-title').innerText = "Add New Clan";
          document.getElementById('submit-btn').innerText = "Save Clan Data";
          document.getElementById('cancel-edit-btn').style.display = "none";
          
          document.getElementById('clan-name').value = ''; document.getElementById('clan-tag').value = '';
          document.getElementById('clan-link').value = ''; document.getElementById('cwl-league').value = '';
          document.getElementById('max-members').value = ''; document.getElementById('clan-desc').value = '';
          document.querySelectorAll('.th-checkbox').forEach(cb => cb.checked = false);
          
          setTimeout(() => document.getElementById('success-msg').innerText = '', 3000);
      }
      document.getElementById('cancel-edit-btn').addEventListener('click', resetForm);

      // --- Section Reordering Functions ---
      async function loadSectionOrder(availableGroups) {
          const orderDoc = await getDoc(doc(db, "settings", "layout"));
          currentOrder = orderDoc.exists() ? orderDoc.data().order || [] : [];
          availableGroups.forEach(g => { if(!currentOrder.includes(g)) currentOrder.push(g); });
          currentOrder = currentOrder.filter(g => availableGroups.includes(g));
          renderOrderList();
      }

      function renderOrderList() {
          const container = document.getElementById('sortable-sections'); 
          container.innerHTML = '';
          if(currentOrder.length === 0) {
              container.innerHTML = '<p style="text-align: center; color: #94a3b8; font-size: 14px;">No sections available to sort.</p>';
              return;
          }
          currentOrder.forEach((group, index) => {
              const div = document.createElement('div'); div.className = 'sort-item';
              div.innerHTML = `<span>Section: TH ${group}</span><div class="sort-actions"><button onclick="moveOrder(${index},-1)" ${index === 0 ? 'disabled' : ''}>▲</button><button onclick="moveOrder(${index},1)" ${index === currentOrder.length - 1 ? 'disabled' : ''}>▼</button></div>`;
              container.appendChild(div);
          });
      }

      window.moveOrder = (index, dir) => {
          const temp = currentOrder[index]; 
          currentOrder[index] = currentOrder[index + dir]; 
          currentOrder[index + dir] = temp;
          renderOrderList();
      };

      document.getElementById('save-order-btn').onclick = async () => {
          document.getElementById('save-order-btn').innerText = "Saving Layout...";
          await setDoc(doc(db, "settings", "layout"), { order: currentOrder });
          document.getElementById('save-order-btn').innerText = "Update Layout Order";
          document.getElementById('order-success-msg').innerText = "Layout order updated on live site!";
          setTimeout(() => document.getElementById('order-success-msg').innerText = '', 3000);
      };
    </script>
</body>
</html>
